<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNY Company - 직원 출퇴근용 QR</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .qr-wrapper { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-width: 450px; width: 100%; margin: 20px; }
        h1 { color: #2c3e50; font-size: 28px; margin-bottom: 5px; font-weight: bold; }
        .sub-title { color: #7f8c8d; font-size: 16px; margin-bottom: 25px; font-weight: 500; }
        
        #qr-image { width: 250px; height: 250px; margin: 15px 0; }
        
        .timer-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-top: 20px; }
        .timer-fill { height: 100%; width: 100%; background: #e74c3c; transform-origin: left; animation: countdown 10s linear infinite; }
        
        .notice { color: #e74c3c; font-size: 14px; margin-top: 15px; font-weight: bold; }
        
        @keyframes countdown { from { transform: scaleX(1); } to { transform: scaleX(0); } }
    </style>
</head>
<body>

    <div class="qr-wrapper">
        <h1>직원 출퇴근 인증</h1>
        <div class="sub-title">스마트폰 기본 카메라로 스캔하세요</div>
        
        <img id="qr-image" src="" alt="출퇴근 보안 QR코드">
        
        <div class="timer-bar">
            <div class="timer-fill" id="progress"></div>
        </div>
        <p class="notice">⚠️ 보안을 위해 10초마다 코드가 자동 갱신됩니다.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            generateAdminQR();
            setInterval(generateAdminQR, 10000); // 10초마다 QR 갱신

            // 타이머 애니메이션 재시작
            setInterval(() => {
                const prog = document.getElementById('progress');
                prog.style.animation = 'none';
                prog.offsetHeight; 
                prog.style.animation = null;
            }, 10000);
        });

        function generateAdminQR() {
            // 안정적인 KST 시간 기반 토큰 생성
            const nowKst = new Date(Date.now() + (9 * 60 * 60 * 1000));
            const timeSlice = Math.floor(nowKst.getTime() / 10000);
            
            // 직원이 찍을 출퇴근용 URL 생성
            const targetUrl = `${window.location.origin}/attendance.html?token=${timeSlice}`;
            
            document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(targetUrl)}`;
        }
    </script>
</body>
</html>
