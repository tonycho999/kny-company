<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNY Company - 웨이팅 접수</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f6fa; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .wrapper { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); max-width: 450px; width: 100%; }
        h1 { font-size: 24px; color: #2c3e50; text-align: center; margin-bottom: 5px; }
        .loc-name { text-align: center; color: #3498db; font-weight: bold; margin-bottom: 25px; font-size: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; font-size: 14px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .chk-container { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; background: #edf2f7; padding: 12px; border-radius: 8px; cursor: pointer; }
        button { width: 100%; padding: 16px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .error-screen { text-align: center; padding: 40px 20px; }
        .error-screen h2 { color: #e74c3c; font-size: 26px; margin-bottom: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="wrapper" id="main-content">
    <div id="form-area">
        <h1>대기 접수 등록</h1>
        <div class="loc-name" id="team-title">📍 행사장 확인 중...</div>
        <form id="waitingForm" onsubmit="handleSubmit(event)">
            <label>방문자 성명</label>
            <input type="text" id="name" required placeholder="성함을 입력해주세요">
            <label>연락처 (하이픈 없이 입력)</label>
            <input type="text" id="phone" required placeholder="01012345678">
            <label>동반 인원수</label>
            <input type="number" id="count" min="1" value="1" required>
            <label class="chk-container">
                <input type="checkbox" id="kakao" checked>
                <span>카카오톡 알림톡 수신에 동의합니다.</span>
            </label>
            <button type="submit">대기 등록하기</button>
        </form>
    </div>
    <div id="error-area" class="error-screen hidden">
        <h2>🚫 접수 불가 (만료된 QR)</h2>
        <p style="color:#7f8c8d; font-size:16px; line-height:1.6; word-break:keep-all;">
            해당 QR 코드는 만료되었거나 원격에서 복사된 링크입니다.<br>
            <b>반드시 행사장 입구에 있는 화면의 최신 QR 코드</b>를 실시간으로 스캔하여 접수해 주시기 바랍니다.
        </p>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const teamName = urlParams.get('team');
    const scanToken = urlParams.get('token'); 

    document.addEventListener('DOMContentLoaded', () => {
        if (!teamName || !scanToken) {
            blockAccess();
            return;
        }
        
        const currentSlice = Math.floor(Date.now() / 10000);
        const tokenDiff = currentSlice - parseInt(scanToken);

        if (tokenDiff < 0 || tokenDiff > 2) { 
            blockAccess();
            return;
        }
        document.getElementById('team-title').innerText = `📍 ${decodeURIComponent(teamName)}`;
    });

    function blockAccess() {
        document.getElementById('form-area').classList.add('hidden');
        document.getElementById('error-area').classList.remove('hidden');
    }

    async function handleSubmit(e) {
        e.preventDefault();
        const payload = {
            team_name: teamName,
            name: document.getElementById('name').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            count: parseInt(document.getElementById('count').value),
            kakao_enabled: document.getElementById('kakao').checked ? 1 : 0
        };

        try {
            const res = await fetch('/api/waitlist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            
            if(res.ok) {
                window.location.href = `/waiting/status.html?id=${result.id}&team=${encodeURIComponent(teamName)}`;
            } else {
                alert(`등록 실패: ${result.error}`);
            }
        } catch {
            alert('서버 통신 오류');
        }
    }
</script>
</body>
</html>
