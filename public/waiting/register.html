<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNY Company - 웨이팅 접수</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f6fa; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .wrapper { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); max-width: 450px; width: 100%; }
        h1 { font-size: 24px; color: #2c3e50; text-align: center; margin-bottom: 5px; }
        .loc-name { text-align: center; color: #3498db; font-weight: bold; margin-bottom: 25px; font-size: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; font-size: 14px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; text-align: center; }
        .chk-container { display: flex; align-items: center; gap: 10px; margin-bottom: 25px; background: #edf2f7; padding: 12px; border-radius: 8px; cursor: pointer; }
        button { width: 100%; padding: 16px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .error-screen { text-align: center; padding: 40px 20px; }
        .error-screen h2 { color: #e74c3c; font-size: 26px; margin-bottom: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="wrapper" id="main-content">
    <div id="form-area">
        <h1 id="txt-h1">대기 접수 등록</h1>
        <div class="loc-name" id="team-title">📍 행사장 확인 중...</div>
        
        <form id="waitingForm" onsubmit="handleSubmit(event)">
            <label id="txt-name-lbl">방문자 성명</label>
            <input type="text" id="name" required placeholder="성함을 입력해주세요">
            
            <label id="txt-phone-lbl">연락처 (하이픈 없이 입력)</label>
            <input type="text" id="phone" required placeholder="01012345678">
            
            <label id="txt-count-lbl">동반 인원수</label>
            <input type="number" id="count" min="1" value="1" required>
            
            <label class="chk-container">
                <input type="checkbox" id="kakao" checked>
                <span id="txt-agree">카카오톡 알림톡 수신에 동의합니다.</span>
            </label>
            
            <button type="submit" id="submitBtn">대기 등록하기</button>
        </form>
    </div>

    <div id="error-area" class="error-screen hidden">
        <h2 id="txt-err-title">🚫 접수 불가 (만료된 QR)</h2>
        <p id="txt-err-desc" style="color:#7f8c8d; font-size:16px; line-height:1.6; word-break:keep-all;">
            해당 QR 코드는 만료되었거나 원격에서 복사된 링크입니다.<br>
            <b>반드시 행사장 입구에 있는 화면의 최신 QR 코드</b>를 실시간으로 스캔하여 접수해 주시기 바랍니다.
        </p>
    </div>
</div>

<script>
    // 💡 다국어 사전
    const i18n = {
        ko: { title: "KNY Company - 웨이팅 접수", h1: "대기 접수 등록", locLoad: "📍 행사장 확인 중...", nameLbl: "방문자 성명", namePh: "성함을 입력해주세요", phoneLbl: "연락처 (하이픈 없이 입력)", phonePh: "01012345678", countLbl: "동반 인원수", agree: "알림 수신에 동의합니다.", btn: "대기 등록하기", btnIng: "접수 처리 중...", errTitle: "🚫 접수 불가 (만료된 QR)", errDesc: "해당 QR 코드는 만료되었거나 원격에서 복사된 링크입니다.<br><b>반드시 행사장 입구에 있는 화면의 최신 QR 코드</b>를 실시간으로 스캔해 주세요.", alertFail: "등록 실패: ", alertErr: "서버 통신 오류" },
        en: { title: "KNY Company - Waiting List", h1: "Waiting Registration", locLoad: "📍 Checking location...", nameLbl: "Name", namePh: "Please enter your name", phoneLbl: "Phone Number (No hyphens)", phonePh: "e.g. 01012345678", countLbl: "Number of People", agree: "I agree to receive text notifications.", btn: "Register", btnIng: "Processing...", errTitle: "🚫 Registration Unavailable", errDesc: "This QR code is expired or copied remotely.<br><b>Please scan the latest QR code</b> at the entrance.", alertFail: "Registration failed: ", alertErr: "Server error" },
        ja: { title: "KNY Company - 順番待ち受付", h1: "順番待ち登録", locLoad: "📍 会場を確認中...", nameLbl: "お名前", namePh: "お名前を入力してください", phoneLbl: "電話番号（ハイフンなし）", phonePh: "例: 09012345678", countLbl: "同伴者数", agree: "通知メッセージの受信に同意します。", btn: "登録する", btnIng: "処理中...", errTitle: "🚫 登録不可（期限切れ）", errDesc: "このQRコードは期限切れ、またはコピーされたリンクです。<br><b>必ず入り口の画面にある最新のQRコード</b>をスキャンしてください。", alertFail: "登録失敗: ", alertErr: "サーバー通信エラー" },
        zh: { title: "KNY Company - 等候登记", h1: "等候登记", locLoad: "📍 正在确认场地...", nameLbl: "姓名", namePh: "请输入您的姓名", phoneLbl: "联系电话（无连字符）", phonePh: "例: 13812345678", countLbl: "同行人数", agree: "我同意接收通知消息。", btn: "提交登记", btnIng: "处理中...", errTitle: "🚫 无法登记（二维码已过期）", errDesc: "此二维码已过期或为复制的链接。<br>请务必扫描<b>入口屏幕上的最新二维码</b>进行登记。", alertFail: "登记失败: ", alertErr: "服务器通信错误" }
    };

    let userLang = (navigator.language || navigator.userLanguage || 'en').substring(0, 2);
    if (!['ko', 'en', 'ja', 'zh'].includes(userLang)) userLang = 'en'; // 기본값 영어
    const lang = i18n[userLang];

    const urlParams = new URLSearchParams(window.location.search);
    const teamName = urlParams.get('team');
    const scanToken = urlParams.get('token'); 

    const audioRegistered = new Audio('/sounds/wait_registered.mp3');
    let audioCtx;

    document.addEventListener('DOMContentLoaded', () => {
        // 텍스트 다국어 적용
        document.title = lang.title;
        document.getElementById('txt-h1').innerText = lang.h1;
        document.getElementById('team-title').innerText = lang.locLoad;
        document.getElementById('txt-name-lbl').innerText = lang.nameLbl;
        document.getElementById('name').placeholder = lang.namePh;
        document.getElementById('txt-phone-lbl').innerText = lang.phoneLbl;
        document.getElementById('phone').placeholder = lang.phonePh;
        document.getElementById('txt-count-lbl').innerText = lang.countLbl;
        document.getElementById('txt-agree').innerText = lang.agree;
        document.getElementById('submitBtn').innerText = lang.btn;
        document.getElementById('txt-err-title').innerText = lang.errTitle;
        document.getElementById('txt-err-desc').innerHTML = lang.errDesc;

        if (!teamName || !scanToken) {
            blockAccess();
            return;
        }

        const nowKst = new Date(Date.now() + (9 * 60 * 60 * 1000));
        const currentSlice = Math.floor(nowKst.getTime() / 10000);
        const tokenDiff = currentSlice - parseInt(scanToken);

        if (isNaN(tokenDiff) || tokenDiff < 0 || tokenDiff > 5) { 
            blockAccess();
            return;
        }
        
        document.getElementById('team-title').innerText = `📍 ${decodeURIComponent(teamName)}`;
    });

    function blockAccess() {
        document.getElementById('form-area').classList.add('hidden');
        document.getElementById('error-area').classList.remove('hidden');
    }

    // 외국어용 비프음 (Web Audio API)
    function playFallbackBeep() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.value = 600;
        osc.start(audioCtx.currentTime);
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.stop(audioCtx.currentTime + 0.2);
    }

    async function handleSubmit(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = lang.btnIng;
        btn.style.backgroundColor = "#95a5a6";
        btn.disabled = true;

        // 사용자 클릭 시 오디오 권한 획득
        if (userLang !== 'ko' && !audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        const payload = {
            team_name: teamName,
            name: document.getElementById('name').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            count: parseInt(document.getElementById('count').value),
            kakao_enabled: document.getElementById('kakao').checked ? 1 : 0
        };

        try {
            const res = await fetch('/api/waitlist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await res.json();
            
            if(res.ok) {
                // 언어에 따른 소리 재생
                if (userLang === 'ko') {
                    try { await audioRegistered.play(); } catch(err) {}
                } else {
                    playFallbackBeep();
                }
                
                sessionStorage.setItem('waitlist_id', result.id);
                sessionStorage.setItem('waitlist_team', teamName);
                
                setTimeout(() => {
                    window.location.href = `/waiting/status.html`;
                }, 2500); 
            } else {
                alert(lang.alertFail + result.error);
                btn.innerText = lang.btn;
                btn.style.backgroundColor = "#3498db";
                btn.disabled = false;
            }
        } catch {
            alert(lang.alertErr);
            btn.innerText = lang.btn;
            btn.style.backgroundColor = "#3498db";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
