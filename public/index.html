<section id="projects">
    <h2>주요 진행 행사 및 포트폴리오</h2>
    <p>케이앤와이 주식회사가 진행한 생생한 현장 실적을 확인하세요.</p>
    
    <div id="portfolio-grid" class="portfolio-grid"></div>
</section>

<style>
    .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1200px; width: 100%; margin-top: 40px; padding: 0 20px; }
    .portfolio-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: left; transition: transform 0.2s; }
    .portfolio-card:hover { transform: translateY(-5px); }
    .portfolio-card img { width: 100%; height: 200px; object-fit: cover; }
    .portfolio-card .card-body { padding: 20px; }
    .portfolio-card h3 { font-size: 18px; color: #2c3e50; margin-bottom: 10px; }
    .portfolio-card p { font-size: 14px; color: #7f8c8d; line-height: 1.5; }
</style>

<script>
    // 페이지 로드 시 포트폴리오 동적 호출
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const res = await fetch('/api/portfolios');
            const data = await res.json();
            const grid = document.getElementById('portfolio-grid');
            
            if(data.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; color:#95a5a6;">등록된 포트폴리오 실적이 없습니다.</p>`;
                return;
            }

            grid.innerHTML = data.map(item => `
                <div class="portfolio-card">
                    <img src="${item.image_url || '/images/default-placeholder.png'}" alt="${item.title}">
                    <div class="card-body">
                        <h3>${item.title}</h3>
                        <p>${item.description}</p>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('portfolio-grid').innerHTML = `<p style="grid-column: 1/-1; color:#e74c3c;">실적 로딩 중 오류가 발생했습니다.</p>`;
        }
    });
</script>
