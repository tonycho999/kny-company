<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장 대기열 통제 시스템</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; margin: 0; padding: 20px; color: #2c3e50; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        .top-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 15px; }
        
        .btn-qr { display: block; text-align: center; background: #2c3e50; color: white; padding: 15px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn-qr:hover { background: #34495e; }
        .btn-qr.disabled { background: #95a5a6; pointer-events: none; }

        .list-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 15px; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: bold; color: #7f8c8d; }
        
        .status-waiting { color: #e67e22; font-weight: bold; }
        .status-called { color: #e74c3c; font-weight: bold; }
        .status-completed { color: #95a5a6; }

        .btn-action { padding: 8px 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; color: white; }
        .btn-call { background: #2ecc71; margin-right: 5px; }
        .btn-complete { background: #95a5a6; }

        @media (max-width: 600px) {
            th:nth-child(3), td:nth-child(3) { display: none; } /* 모바일에서 인원수 숨김 */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 현장 웨이팅 통제 데스크</h1>

    <div class="top-card">
        <label>📍 현재 담당하고 있는 행사장을 선택하세요</label>
        <select id="team-selector" onchange="handleTeamChange()">
            <option value="">데이터를 불러오는 중...</option>
        </select>
        
        <a href="#" id="qr-link" target="_blank" class="btn-qr disabled">📺 입구 고객용 QR 스크린 띄우기 (클릭)</a>
    </div>

    <div class="list-card">
        <table>
            <thead>
                <tr>
                    <th>대기번호</th>
                    <th>이름/연락처</th>
                    <th>인원</th>
                    <th>상태</th>
                    <th>조작</th>
                </tr>
            </thead>
            <tbody id="waitlist-tbody">
                <tr><td colspan="5" style="padding:30px; color:#7f8c8d;">행사장을 선택하면 대기열이 표시됩니다.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let refreshInterval;

    document.addEventListener('DOMContentLoaded', () => {
        loadTeams();
    });

    // 1. 등록된 행사장 목록 불러오기 (직원 데이터 기준)
    async function loadTeams() {
        try {
            const res = await fetch('/api/employees');
            const list = await res.json();
            const teams = [...new Set(list.map(emp => emp.team_name).filter(Boolean))];
            
            const selector = document.getElementById('team-selector');
            if(teams.length === 0) {
                selector.innerHTML = '<option value="">등록된 행사장이 없습니다.</option>';
                return;
            }
            
            selector.innerHTML = '<option value="">-- 행사장을 선택하세요 --</option>' + 
                                 teams.map(team => `<option value="${team}">${team}</option>`).join('');
        } catch (e) { console.log("팀 로드 실패", e); }
    }

    // 2. 행사장이 선택되었을 때 QR 링크 활성화 및 리스트 로드 시작
    function handleTeamChange() {
        const teamName = document.getElementById('team-selector').value;
        const qrLink = document.getElementById('qr-link');
        
        if (refreshInterval) clearInterval(refreshInterval);

        if (!teamName) {
            qrLink.classList.add('disabled');
            qrLink.href = "#";
            document.getElementById('waitlist-tbody').innerHTML = '<tr><td colspan="5" style="padding:30px; color:#7f8c8d;">행사장을 선택하면 대기열이 표시됩니다.</td></tr>';
            return;
        }

        // QR 화면 링크 세팅
        qrLink.href = `${window.location.origin}/waiting/qr-display.html?team=${encodeURIComponent(teamName)}`;
        qrLink.classList.remove('disabled');

        // 리스트 최초 로드 및 5초마다 자동 갱신
        loadWaitlistData();
        refreshInterval = setInterval(loadWaitlistData, 5000);
    }

    // 3. 웨이팅 리스트 데이터 로드
    async function loadWaitlistData() {
        const teamName = document.getElementById('team-selector').value;
        if(!teamName) return;

        try {
            const res = await fetch(`/api/admin/waitlist?teamName=${encodeURIComponent(teamName)}`);
            const list = await res.json();
            
            if (list.length === 0) {
                document.getElementById('waitlist-tbody').innerHTML = '<tr><td colspan="5" style="padding:30px; color:#7f8c8d;">현재 대기열이 없습니다.</td></tr>';
                return;
            }

            document.getElementById('waitlist-tbody').innerHTML = list.map(item => {
                // 연락처 마스킹 처리 (예: 01012345678 -> 010-****-5678)
                const maskedPhone = item.phone.length === 11 
                    ? `${item.phone.substring(0,3)}-****-${item.phone.substring(7,11)}` 
                    : item.phone;

                let statusBadge = '';
                if(item.status === 'waiting') statusBadge = '<span class="status-waiting">대기중</span>';
                if(item.status === 'called') statusBadge = '<span class="status-called">호출됨</span>';
                if(item.status === 'completed') statusBadge = '<span class="status-completed">입장완료</span>';

                return `
                <tr>
                    <td style="font-weight:bold; font-size:18px;">${item.waiting_number}</td>
                    <td>
                        <div style="font-weight:bold;">${item.name}</div>
                        <div style="font-size:12px; color:#7f8c8d;">${maskedPhone}</div>
                    </td>
                    <td>${item.count}명</td>
                    <td>${statusBadge}</td>
                    <td>
                        ${item.status !== 'completed' ? `
                            <button class="btn-action btn-call" onclick="callCustomer(${item.id})">호출</button>
                            <button class="btn-action btn-complete" onclick="completeCustomer(${item.id})">완료</button>
                        ` : '-'}
                    </td>
                </tr>
                `;
            }).join('');
        } catch(e) { console.log(e); }
    }

    // 4. 고객 호출 함수
    async function callCustomer(id) {
        if(!confirm('이 고객을 호출하시겠습니까?\n(고객 화면에 입장 안내가 즉시 뜹니다.)')) return;
        try {
            await fetch('/api/admin/waitlist', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, status: 'called' })
            });
            loadWaitlistData();
        } catch(e) { alert('통신 오류'); }
    }

    // 5. 입장 완료 함수
    async function completeCustomer(id) {
        if(!confirm('이 고객을 입장 완료 처리하시겠습니까?')) return;
        try {
            await fetch('/api/admin/waitlist', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, status: 'completed' })
            });
            loadWaitlistData();
        } catch(e) { alert('통신 오류'); }
    }
</script>
</body>
</html>
