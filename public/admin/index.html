<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNY Company - 통합 관리자 패널</title>
    <!-- Quill 에디터 CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        
        .tab-menu { display: flex; justify-content: center; margin-bottom: 30px; gap: 10px; }
        .tab-btn { padding: 12px 30px; border: none; background: #e0e0e0; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .tab-btn.active { background: #3b428b; color: white; }
        
        .panel { display: none; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .panel.active { display: block; }
        
        /* --- 직원 관리 전용 스타일 --- */
        .search-box { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e1e8ed; }
        .search-box input, .search-box select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .search-box button { background: #3b428b; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .add-employee-form { display: flex; gap: 10px; margin-bottom: 25px; background: #eef2f5; padding: 20px; border-radius: 8px; align-items: flex-end; }
        .add-employee-form .form-group { display: flex; flex-direction: column; flex: 1; }
        .add-employee-form label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .add-employee-form input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .add-employee-form button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; height: 40px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; text-align: center; }
        th, td { border: 1px solid #e1e8ed; padding: 12px; }
        th { background: #3b428b; color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        
        button.delete-btn { background: #e74c3c; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        /* --- 포트폴리오 관리 전용 스타일 --- */
        .pf-form-group { margin-bottom: 20px; }
        .pf-form-group label { display: block; font-weight: bold; margin-bottom: 8px; }
        .pf-form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-save-pf { background: #2ecc71; color: white; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👨‍💼 KNY Company 통합 관리자 시스템</h1>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="showPanel('employee-panel')">직원 조회 및 근태 관리</button>
        <button class="tab-btn" onclick="showPanel('portfolio-panel')">포트폴리오 작성/관리</button>
    </div>

    <!-- 1️⃣ 💡 복구된 대규모 직원 및 근태 관리 패널 -->
    <div id="employee-panel" class="panel active">
        
        <!-- 신규 직원 등록 -->
        <div class="add-employee-form">
            <div class="form-group">
                <label>사원번호</label>
                <input type="text" id="add-emp-id" placeholder="예: 2026001">
            </div>
            <div class="form-group">
                <label>이름</label>
                <input type="text" id="add-name" placeholder="홍길동">
            </div>
            <div class="form-group">
                <label>연락처</label>
                <input type="text" id="add-phone" placeholder="01012345678">
            </div>
            <div class="form-group">
                <label>배정 행사장 (팀)</label>
                <input type="text" id="add-team" placeholder="과천A">
            </div>
            <button onclick="addEmployee()">직원 신규 등록</button>
        </div>

        <!-- 강력한 다중 필터 검색창 -->
        <div class="search-box">
            <input type="date" id="search-date">
            <select id="search-team">
                <option value="">모든 행사장</option>
            </select>
            <input type="text" id="search-keyword" placeholder="이름, 사원번호, 또는 연락처 검색" style="flex:1;">
            <button onclick="searchEmployees()">조회하기</button>
            <button onclick="resetSearch()" style="background:#7f8c8d;">초기화</button>
        </div>

        <!-- 출퇴근 및 직원 목록 데이터 테이블 -->
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>사원번호</th>
                        <th>이름</th>
                        <th>연락처</th>
                        <th>근무 팀/행사장</th>
                        <th>출근 시간</th>
                        <th>퇴근 시간</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="emp-tbody">
                    <tr><td colspan="7" style="padding:40px; color:#7f8c8d;">데이터를 불러오는 중입니다...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 2️⃣ 포트폴리오 관리 패널 -->
    <div id="portfolio-panel" class="panel">
        <h3 style="margin-top:0;">새 포트폴리오 작성</h3>
        <div class="pf-form-group">
            <label>제목</label>
            <input type="text" id="pf-title" placeholder="행사 실적 제목을 입력하세요">
        </div>
        <div class="pf-form-group">
            <label>본문 내용 (사진/텍스트)</label>
            <div id="editor-container" style="height: 400px; background: white;"></div>
        </div>
        <button class="btn-save-pf" onclick="savePortfolio()">포트폴리오 업로드 및 저장</button>

        <h3 style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 30px;">등록된 포트폴리오 목록</h3>
        <table>
            <thead>
                <tr>
                    <th style="width: 10%;">ID</th>
                    <th style="width: 50%;">제목</th>
                    <th style="width: 20%;">등록일</th>
                    <th style="width: 20%;">관리</th>
                </tr>
            </thead>
            <tbody id="pf-tbody">
                <tr><td colspan="4" style="padding:20px; color:#7f8c8d;">포트폴리오 데이터를 불러오는 중입니다...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<!-- Quill 에디터 스크립트 -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    // 포트폴리오용 에디터 세팅
    const quill = new Quill('#editor-container', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'align': [] }],
                ['image', 'link']
            ]
        }
    });

    // 탭 전환 로직
    function showPanel(panelId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
        event.target.classList.add('active');
    }

    let allEmployees = []; // 클라이언트 사이드 검색을 위한 원본 데이터 보관

    document.addEventListener('DOMContentLoaded', () => {
        // 오늘 날짜로 검색창 기본 세팅
        document.getElementById('search-date').valueAsDate = new Date();
        loadEmployees();
        loadPortfolios();
    });

    // ==============================================
    // 💡 1. 대규모 직원 및 근태 관리 로직 복구 완료
    // ==============================================

    async function loadEmployees() {
        try {
            const res = await fetch('/api/employees');
            allEmployees = await res.json();
            
            // 팀(행사장) 필터 목록 동적 생성
            updateTeamFilter();
            // 데이터 화면에 뿌리기
            renderEmployeeTable(allEmployees);
        } catch(e) {
            document.getElementById('emp-tbody').innerHTML = '<tr><td colspan="7" style="color:red;">데이터 로딩 실패. 새로고침 해주세요.</td></tr>';
        }
    }

    function updateTeamFilter() {
        const teams = [...new Set(allEmployees.map(emp => emp.team_name).filter(Boolean))];
        const selector = document.getElementById('search-team');
        const currentVal = selector.value;
        
        selector.innerHTML = '<option value="">모든 행사장</option>' + 
                             teams.map(team => `<option value="${team}">${team}</option>`).join('');
        selector.value = currentVal; // 기존 선택 유지
    }

    function searchEmployees() {
        const dateVal = document.getElementById('search-date').value; // YYYY-MM-DD
        const teamVal = document.getElementById('search-team').value;
        const keyword = document.getElementById('search-keyword').value.toLowerCase();

        const filtered = allEmployees.filter(emp => {
            // 1. 날짜 필터 (출근 시간 기준, 데이터가 없으면 오늘 등록된 사람인지 확인하는 로직 필요시 추가)
            let dateMatch = true;
            if (dateVal && emp.check_in_time) {
                const checkInDate = new Date(emp.check_in_time).toISOString().split('T')[0];
                dateMatch = (checkInDate === dateVal);
            } else if (dateVal && !emp.check_in_time) {
                // 출근 기록이 없는 직원은 날짜 검색에서 일단 보여줌 (결근 파악용)
                dateMatch = true; 
            }

            // 2. 팀 필터
            const teamMatch = !teamVal || emp.team_name === teamVal;

            // 3. 키워드 필터 (사원번호, 이름, 연락처)
            const keywordMatch = !keyword || 
                                 (emp.name && emp.name.toLowerCase().includes(keyword)) ||
                                 (emp.emp_id && emp.emp_id.toLowerCase().includes(keyword)) ||
                                 (emp.phone && emp.phone.includes(keyword));

            return dateMatch && teamMatch && keywordMatch;
        });

        renderEmployeeTable(filtered);
    }

    function resetSearch() {
        document.getElementById('search-date').value = '';
        document.getElementById('search-team').value = '';
        document.getElementById('search-keyword').value = '';
        renderEmployeeTable(allEmployees);
    }

    function renderEmployeeTable(data) {
        const tbody = document.getElementById('emp-tbody');
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="padding:30px;">조건에 맞는 직원이 없습니다.</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(emp => `
            <tr>
                <td style="font-weight:bold;">${emp.emp_id || '-'}</td>
                <td>${emp.name}</td>
                <td>${emp.phone}</td>
                <td>${emp.team_name}</td>
                <td style="color:#2ecc71; font-weight:bold;">${emp.check_in_time ? new Date(emp.check_in_time).toLocaleString('ko-KR') : '미출근'}</td>
                <td style="color:#e74c3c;">${emp.check_out_time ? new Date(emp.check_out_time).toLocaleString('ko-KR') : '-'}</td>
                <td><button class="delete-btn" onclick="deleteEmployee(${emp.id})">정보 삭제</button></td>
            </tr>
        `).join('');
    }

    async function addEmployee() {
        const emp_id = document.getElementById('add-emp-id').value.trim();
        const name = document.getElementById('add-name').value.trim();
        const phone = document.getElementById('add-phone').value.trim();
        const team_name = document.getElementById('add-team').value.trim();

        if(!emp_id || !name || !phone || !team_name) return alert('직원 정보를 모두 입력해주세요.');

        try {
            const res = await fetch('/api/employees', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ emp_id, name, phone, team_name })
            });
            
            if(res.ok) {
                alert('직원 등록 완료');
                document.getElementById('add-emp-id').value = '';
                document.getElementById('add-name').value = '';
                document.getElementById('add-phone').value = '';
                document.getElementById('add-team').value = '';
                loadEmployees(); // 재조회
            } else {
                alert('등록 실패 (사원번호 중복 가능성)');
            }
        } catch(e) {
            alert('서버 통신 오류');
        }
    }

    async function deleteEmployee(id) {
        if(!confirm('이 직원의 정보를 완전히 삭제하시겠습니까?\n(기존 출퇴근 기록도 함께 삭제될 수 있습니다)')) return;
        await fetch('/api/employees', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id })
        });
        loadEmployees();
    }

    // ==============================================
    // 💡 2. 포트폴리오 관리 로직
    // ==============================================

    async function loadPortfolios() {
        try {
            const res = await fetch('/api/portfolios');
            const data = await res.json();
            const tbody = document.getElementById('pf-tbody');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="padding:20px;">등록된 포트폴리오가 없습니다.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>${item.id}</td>
                    <td style="text-align:left; font-weight:bold;">${item.title}</td>
                    <td>${new Date(item.created_at).toLocaleDateString('ko-KR')}</td>
                    <td><button class="delete-btn" onclick="deletePortfolio(${item.id})">게시물 삭제</button></td>
                </tr>
            `).join('');
        } catch(e) {
            document.getElementById('pf-tbody').innerHTML = '<tr><td colspan="4">데이터 로딩 오류</td></tr>';
        }
    }

    async function savePortfolio() {
        const title = document.getElementById('pf-title').value;
        const content = quill.root.innerHTML;

        if (!title.trim() || content === '<p><br></p>') {
            return alert('제목과 행사 사진/내용을 작성해주세요.');
        }

        try {
            const res = await fetch('/api/portfolios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });

            if (res.ok) {
                alert('홈페이지에 실적이 반영되었습니다!');
                document.getElementById('pf-title').value = '';
                quill.root.innerHTML = ''; 
                loadPortfolios();
            } else {
                alert('실적 업로드 실패');
            }
        } catch (e) {
            alert('서버 통신 오류');
        }
    }

    async function deletePortfolio(id) {
        if(!confirm('홈페이지에서 이 행사 실적을 내리시겠습니까?')) return;
        try {
            await fetch('/api/portfolios', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
            });
            loadPortfolios();
        } catch(e) {
            alert('통신 오류');
        }
    }
</script>
</body>
</html>
