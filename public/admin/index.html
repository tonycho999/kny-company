<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KNY Company - 관리자 통합 대시보드</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f1f2f6; overflow: hidden; }
        .sidebar { width: 260px; background: #2c3e50; color: white; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-size: 20px; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; text-decoration: none; color: white; transition: 0.2s; }
        .menu-item:hover, .menu-item.active { background: #34495e; color: #3498db; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        iframe { flex: 1; border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>KNY Admin Panel</h2>
        <a href="portfolio.html" target="content-frame" class="menu-item active" onclick="setActive(this)">🖼️ 포트폴리오 관리</a>
        <a href="employees.html" target="content-frame" class="menu-item" onclick="setActive(this)">👥 직원 명부 관리</a>
        <a href="attendance.html" target="content-frame" class="menu-item" onclick="setActive(this)">⏰ 출퇴근 근태 현황</a>
        <a href="qr-manager.html" target="content-frame" class="menu-item" onclick="setActive(this)">🔲 직원 출퇴근용 QR</a>
    </div>

    <div class="main-content">
        <!-- 첫 로딩 시 포트폴리오 페이지를 띄움 -->
        <iframe name="content-frame" src="portfolio.html"></iframe>
    </div>

    <script>
        function setActive(element) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
