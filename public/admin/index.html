<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNY Company - 통합 관리자 패널</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        
        .tab-menu { display: flex; justify-content: center; margin-bottom: 30px; gap: 10px; }
        .tab-btn { padding: 12px 30px; border: none; background: #e0e0e0; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .tab-btn.active { background: #3b428b; color: white; }
        
        .panel { display: none; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .panel.active { display: block; }
        
        .search-box { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e1e8ed; align-items: center; }
        .search-box input, .search-box select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .search-box button { background: #3b428b; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .add-employee-form { display: flex; gap: 10px; margin-bottom: 25px; background: #eef2f5; padding: 20px; border-radius: 8px; align-items: flex-end; }
        .add-employee-form .form-group { display: flex; flex-direction: column; flex: 1; }
        .add-employee-form label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .add-employee-form input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .add-employee-form button { background: #2ecc71; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; height: 40px; transition: 0.2s; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; text-align: center; }
        th, td { border: 1px solid #e1e8ed; padding: 12px; }
        th { background: #3b428b; color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        
        .btn-action { color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin: 2px; }
        .btn-edit { background: #f39c12; }
        .btn-delete { background: #e74c3c; }
        
        .pf-form-group { margin-bottom: 20px; }
        .pf-form-group label { display: block; font-weight: bold; margin-bottom: 8px; }
        .pf-form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-save-pf { background: #2ecc71; color: white; padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👨‍💼 KNY Company 사장님 전용 대시보드</h1>
    
    <!-- 💡 탭이 3개로 나뉘었습니다 -->
    <div class="tab-menu">
        <button class="tab-btn active" onclick="showPanel('employee-panel', this)">직원 등록 및 조회</button>
        <button class="tab-btn" onclick="showPanel('attendance-panel', this)">직원 근태 관리</button>
        <button class="tab-btn" onclick="showPanel('portfolio-panel', this)">포트폴리오 관리</button>
    </div>

    <!-- 1️⃣ 직원 등록 및 조회 패널 (출퇴근 시간 제외) -->
    <div id="employee-panel" class="panel active">
        <div class="add-employee-form">
            <div class="form-group"><label>사원번호</label><input type="text" id="add-emp-id" placeholder="예: 2026001"></div>
            <div class="form-group"><label>이름</label><input type="text" id="add-name" placeholder="홍길동"></div>
            <div class="form-group"><label>연락처</label><input type="text" id="add-phone" placeholder="01012345678"></div>
            <div class="form-group"><label>배정 행사장</label><input type="text" id="add-team" placeholder="과천A"></div>
            
            <button id="btn-emp-submit" onclick="addOrUpdateEmployee()">직원 신규 등록</button>
            <button id="btn-emp-cancel" onclick="resetEmployeeForm()" style="display:none; background:#7f8c8d;">취소</button>
        </div>

        <div class="search-box">
            <select id="search-team-emp" onchange="searchEmployees()"><option value="">모든 행사장</option></select>
            <input type="text" id="search-keyword-emp" onkeyup="if(event.keyCode===13) searchEmployees()" placeholder="이름, 사원번호, 또는 연락처 검색" style="flex:1;">
            <button onclick="searchEmployees()">조회하기</button>
            <button onclick="resetEmpSearch()" style="background:#7f8c8d;">초기화</button>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>사원번호</th><th>이름</th><th>연락처</th><th>근무 팀/행사장</th><th>관리 (수정/삭제)</th></tr>
                </thead>
                <tbody id="emp-tbody">
                    <tr><td colspan="5" style="padding:40px; color:#7f8c8d;">데이터를 불러오는 중입니다...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 2️⃣ 근태 관리 패널 (엑셀 다운로드 및 출퇴근 확인) -->
    <div id="attendance-panel" class="panel">
        
        <div class="search-box" style="background:#e8f4f8; border-color:#baddf2;">
            <div style="font-weight:bold; width:100%; color:#2980b9; margin-bottom:5px;">📥 출퇴근 기록 엑셀 다운로드</div>
            <input type="date" id="export-start"> <span style="line-height:40px;">~</span> <input type="date" id="export-end">
            <button onclick="downloadExcel()" style="background:#27ae60; margin-left:auto;">엑셀 다운로드</button>
        </div>

        <div class="search-box">
            <input type="date" id="search-date-att" onchange="searchAttendance()">
            <select id="search-team-att" onchange="searchAttendance()"><option value="">모든 행사장</option></select>
            <input type="text" id="search-keyword-att" onkeyup="if(event.keyCode===13) searchAttendance()" placeholder="이름 검색" style="flex:1;">
            <button onclick="searchAttendance()">조회하기</button>
            <button onclick="resetAttSearch()" style="background:#7f8c8d;">초기화</button>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>사원번호</th><th>이름</th><th>근무 팀/행사장</th><th>최근 출근 시간</th><th>최근 퇴근 시간</th></tr>
                </thead>
                <tbody id="att-tbody">
                    <tr><td colspan="5" style="padding:40px; color:#7f8c8d;">데이터를 불러오는 중입니다...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 3️⃣ 포트폴리오 관리 패널 -->
    <div id="portfolio-panel" class="panel">
        <h3 style="margin-top:0;">새 포트폴리오 작성</h3>
        <div class="pf-form-group"><label>제목</label><input type="text" id="pf-title" placeholder="행사 실적 제목을 입력하세요"></div>
        <div class="pf-form-group"><label>본문 내용 (사진/텍스트)</label><div id="editor-container" style="height: 400px; background: white;"></div></div>
        <button class="btn-save-pf" onclick="savePortfolio()">포트폴리오 업로드 및 저장</button>

        <h3 style="margin-top: 50px; border-top: 1px solid #eee; padding-top: 30px;">등록된 포트폴리오 목록</h3>
        <table>
            <thead>
                <tr><th style="width: 10%;">ID</th><th style="width: 50%;">제목</th><th style="width: 20%;">등록일</th><th style="width: 20%;">관리</th></tr>
            </thead>
            <tbody id="pf-tbody">
                <tr><td colspan="4" style="padding:20px; color:#7f8c8d;">포트폴리오 데이터를 불러오는 중입니다...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    const quill = new Quill('#editor-container', { theme: 'snow', modules: { toolbar: [ [{ 'header': [1, 2, 3, false] }], ['bold', 'italic', 'underline', 'strike'], [{ 'color': [] }, { 'background': [] }], [{ 'align': [] }], ['image', 'link'] ] } });

    function showPanel(panelId, btnElement) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
        if(btnElement) btnElement.classList.add('active');
    }

    let allEmployees = []; 
    let editingEmployeeId = null;

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('search-date-att').valueAsDate = new Date();
        setExportRange('day'); 
        loadEmployees();
        loadPortfolios();
    });

    function setExportRange(type) {
        const nowKst = new Date(Date.now() + (9 * 60 * 60 * 1000));
        let start = new Date(nowKst);
        let end = new Date(nowKst);

        if (type === 'week') {
            const day = start.getDay(); 
            const diffToMonday = start.getDate() - day + (day === 0 ? -6 : 1);
            start.setDate(diffToMonday); 
        } else if (type === 'month') {
            start.setDate(1); 
        }

        document.getElementById('export-start').value = start.toISOString().split('T')[0];
        document.getElementById('export-end').value = end.toISOString().split('T')[0];
    }

    function downloadExcel() {
        const start = document.getElementById('export-start').value;
        const end = document.getElementById('export-end').value;
        if (!start || !end) return alert("날짜를 선택해주세요.");
        window.location.href = `/api/export_attendance?start=${start}&end=${end}`;
    }

    async function loadEmployees() {
        try {
            const res = await fetch('/api/employees');
            allEmployees = await res.json();
            updateTeamFilter();
            renderEmployeeTable(allEmployees);
            renderAttendanceTable(allEmployees);
        } catch(e) { 
            document.getElementById('emp-tbody').innerHTML = '<tr><td colspan="5" style="color:red;">데이터 로딩 실패</td></tr>'; 
            document.getElementById('att-tbody').innerHTML = '<tr><td colspan="5" style="color:red;">데이터 로딩 실패</td></tr>'; 
        }
    }

    function updateTeamFilter() {
        const teams = [...new Set(allEmployees.map(emp => emp.team_name).filter(Boolean))];
        const options = '<option value="">모든 행사장</option>' + teams.map(team => `<option value="${team}">${team}</option>`).join('');
        document.getElementById('search-team-emp').innerHTML = options;
        document.getElementById('search-team-att').innerHTML = options;
    }

    // 💡 직원 탭 검색 로직
    function searchEmployees() {
        const teamVal = document.getElementById('search-team-emp').value;
        const keyword = document.getElementById('search-keyword-emp').value.toLowerCase();

        const filtered = allEmployees.filter(emp => {
            const teamMatch = !teamVal || emp.team_name === teamVal;
            const keywordMatch = !keyword || (emp.name && emp.name.toLowerCase().includes(keyword)) || (emp.emp_id && emp.emp_id.toLowerCase().includes(keyword)) || (emp.phone && emp.phone.includes(keyword));
            return teamMatch && keywordMatch;
        });
        renderEmployeeTable(filtered);
    }

    // 💡 근태 탭 검색 로직
    function searchAttendance() {
        const dateVal = document.getElementById('search-date-att').value;
        const teamVal = document.getElementById('search-team-att').value;
        const keyword = document.getElementById('search-keyword-att').value.toLowerCase();

        const filtered = allEmployees.filter(emp => {
            let dateMatch = true;
            if (dateVal && emp.check_in_time) {
                const checkInDate = new Date(emp.check_in_time).toISOString().split('T')[0];
                dateMatch = (checkInDate === dateVal);
            } else if (dateVal && !emp.check_in_time) { 
                dateMatch = false; // 날짜를 선택했는데 출근기록이 없으면 제외
            }

            const teamMatch = !teamVal || emp.team_name === teamVal;
            const keywordMatch = !keyword || (emp.name && emp.name.toLowerCase().includes(keyword));

            return dateMatch && teamMatch && keywordMatch;
        });
        renderAttendanceTable(filtered);
    }

    function resetEmpSearch() {
        document.getElementById('search-team-emp').value = '';
        document.getElementById('search-keyword-emp').value = '';
        renderEmployeeTable(allEmployees);
    }

    function resetAttSearch() {
        document.getElementById('search-date-att').value = '';
        document.getElementById('search-team-att').value = '';
        document.getElementById('search-keyword-att').value = '';
        renderAttendanceTable(allEmployees);
    }

    function renderEmployeeTable(data) {
        const tbody = document.getElementById('emp-tbody');
        if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="padding:30px;">조건에 맞는 직원이 없습니다.</td></tr>'; return; }
        tbody.innerHTML = data.map(emp => `
            <tr>
                <td style="font-weight:bold;">${emp.emp_id || '-'}</td>
                <td>${emp.name}</td>
                <td>${emp.phone}</td>
                <td>${emp.team_name}</td>
                <td>
                    <button class="btn-action btn-edit" onclick="editEmployee(${emp.id})">수정</button>
                    <button class="btn-action btn-delete" onclick="deleteEmployee(${emp.id})">삭제</button>
                </td>
            </tr>
        `).join('');
    }

    function renderAttendanceTable(data) {
        const tbody = document.getElementById('att-tbody');
        if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="padding:30px;">조건에 맞는 직원이 없습니다.</td></tr>'; return; }
        tbody.innerHTML = data.map(emp => `
            <tr>
                <td style="font-weight:bold;">${emp.emp_id || '-'}</td>
                <td>${emp.name}</td>
                <td>${emp.team_name}</td>
                <td style="color:#2ecc71; font-weight:bold;">${emp.check_in_time ? new Date(emp.check_in_time).toLocaleString('ko-KR') : '미출근'}</td>
                <td style="color:#e74c3c;">${emp.check_out_time ? new Date(emp.check_out_time).toLocaleString('ko-KR') : '-'}</td>
            </tr>
        `).join('');
    }

    function editEmployee(id) {
        const emp = allEmployees.find(e => e.id === id);
        if(!emp) return;
        
        document.getElementById('add-emp-id').value = emp.emp_id || '';
        document.getElementById('add-name').value = emp.name || '';
        document.getElementById('add-phone').value = emp.phone || '';
        document.getElementById('add-team').value = emp.team_name || '';
        
        editingEmployeeId = id;
        const submitBtn = document.getElementById('btn-emp-submit');
        submitBtn.innerText = '완료';
        submitBtn.style.backgroundColor = '#f39c12';
        document.getElementById('btn-emp-cancel').style.display = 'inline-block';
        window.scrollTo({top: 0, behavior: 'smooth'}); 
    }

    function resetEmployeeForm() {
        document.getElementById('add-emp-id').value = '';
        document.getElementById('add-name').value = '';
        document.getElementById('add-phone').value = '';
        document.getElementById('add-team').value = '';
        editingEmployeeId = null;
        
        const submitBtn = document.getElementById('btn-emp-submit');
        submitBtn.innerText = '직원 신규 등록';
        submitBtn.style.backgroundColor = '#2ecc71';
        document.getElementById('btn-emp-cancel').style.display = 'none';
    }

    async function addOrUpdateEmployee() {
        const emp_id = document.getElementById('add-emp-id').value.trim();
        const name = document.getElementById('add-name').value.trim();
        const phone = document.getElementById('add-phone').value.trim();
        const team_name = document.getElementById('add-team').value.trim();

        if(!emp_id || !name || !phone || !team_name) return alert('직원 정보를 모두 입력해주세요.');

        try {
            let res;
            if (editingEmployeeId) {
                res = await fetch('/api/employees', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: editingEmployeeId, emp_id, name, phone, team_name }) });
            } else {
                res = await fetch('/api/employees', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ emp_id, name, phone, team_name }) });
            }

            if(res.ok) {
                alert(editingEmployeeId ? '정보가 성공적으로 수정되었습니다.' : '직원 등록 완료');
                resetEmployeeForm();
                loadEmployees(); 
            } else { alert('요청 실패 (사원번호 중복 가능성)'); }
        } catch(e) { alert('서버 통신 오류'); }
    }

    async function deleteEmployee(id) {
        if(!confirm('이 직원의 정보를 완전히 삭제하시겠습니까?')) return;
        try {
            const res = await fetch(`/api/employees?id=${id}`, { method: 'DELETE' });
            if (res.ok) { alert('삭제되었습니다.'); loadEmployees(); } 
            else { const errData = await res.json(); alert(`삭제에 실패했습니다. 사유: ${errData.error || '알 수 없음'}`); }
        } catch (e) { alert('서버 통신 오류'); }
    }

    async function loadPortfolios() {
        try {
            const res = await fetch('/api/portfolios');
            const data = await res.json();
            const tbody = document.getElementById('pf-tbody');
            if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="padding:20px;">등록된 포트폴리오가 없습니다.</td></tr>'; return; }
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>${item.id}</td><td style="text-align:left; font-weight:bold;">${item.title}</td><td>${new Date(item.created_at).toLocaleDateString('ko-KR')}</td>
                    <td><button class="btn-action btn-delete" onclick="deletePortfolio(${item.id})">게시물 삭제</button></td>
                </tr>
            `).join('');
        } catch(e) {}
    }

    async function savePortfolio() {
        const title = document.getElementById('pf-title').value;
        const content = quill.root.innerHTML;
        if (!title.trim() || content === '<p><br></p>') return alert('제목과 행사 사진/내용을 작성해주세요.');
        try {
            const res = await fetch('/api/portfolios', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, content }) });
            if (res.ok) { alert('홈페이지에 실적이 반영되었습니다!'); document.getElementById('pf-title').value = ''; quill.root.innerHTML = ''; loadPortfolios(); } 
            else { alert('실적 업로드 실패'); }
        } catch (e) { alert('서버 통신 오류'); }
    }

    async function deletePortfolio(id) {
        if(!confirm('홈페이지에서 이 행사 실적을 내리시겠습니까?')) return;
        try { await fetch('/api/portfolios', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) }); loadPortfolios(); } catch(e) {}
    }
</script>
</body>
</html>
