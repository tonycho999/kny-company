<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 출퇴근 관리</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <h1>출퇴근 기록 관리</h1>
        
        <div class="nav-links">
            <a href="/admin/index.html" style="text-decoration: underline; color: #2c3e50;">📅 출퇴근 기록 조회</a>
            <a href="/admin/settings.html">⚙️ 직원 관리 설정</a>
            <a href="/admin/qr-generator.html">📱 보안 QR 코드 생성</a> 
        </div>

        <div class="header-controls" style="margin-bottom: 20px;">
            <div>
                <label for="datePicker" style="font-weight: bold; margin-right: 10px;">조회 조건:</label>
                <input type="date" id="datePicker">
                
                <select id="teamFilter" style="margin-left: 10px; padding: 5px; height: 32px;">
                    <option value="전체">전체 부서</option>
                </select>
                <button id="btnSearch" style="margin-left: 5px; padding: 5px 15px; height: 32px; cursor: pointer; background-color: #34495e; color: white; border: none; border-radius: 4px;">조회</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>사원번호</th>
                    <th>팀명</th> <th>이름</th>
                    <th>연락처</th>
                    <th>출근 시간</th>
                    <th>퇴근 시간</th>
                </tr>
            </thead>
            <tbody id="attendance-body">
                <tr>
                    <td colspan="6" style="text-align: center; color: #7f8c8d;">날짜와 부서를 선택하고 조회 버튼을 누르세요.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
