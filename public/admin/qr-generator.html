<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>보안 QR 코드 생성기</title>
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        .qr-container { text-align: center; margin-top: 30px; }
        #qrImage { margin-top: 20px; border: 10px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.1); width: 250px; height: 250px; }
        .timer { font-weight: bold; color: #e74c3c; margin-top: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>팀별 보안 QR 코드 관리</h1>
        <div class="qr-container">
            <input type="date" id="qrDate">
            <select id="qrTeam">
                <option value="">-- 팀 선택 --</option>
            </select>
            <button class="btn-admin" onclick="startQRStream()">실시간 QR 방송 시작</button>
            
            <div id="qrDisplay" style="display:none;">
                <div class="timer" id="timerDisplay">남은 시간: 20초</div>
                <img id="qrImage" src="" alt="보안 QR코드">
                <p id="qrInfo" style="color:#555; margin-top:10px;"></p>
            </div>
        </div>
    </div>

    <script>
        let qrInterval = null;
        let timerInterval = null;
        let timeLeft = 20;

        // DB에 등록된 팀 목록 동적 로드
        async function loadTeams() {
            const res = await fetch('/api/attendance?type=teams');
            const teams = await res.json();
            const select = document.getElementById('qrTeam');
            teams.forEach(team => {
                const opt = document.createElement('option');
                opt.value = team;
                opt.innerText = team;
                select.appendChild(opt);
            });
        }

        function generateToken() {
            const now = new Date();
            const kstTime = new Date(now.getTime() + (9 * 60 * 60 * 1000));
            const timestamp = Math.floor(kstTime.getTime() / 20000); // 20초 단위
            return String((timestamp) % 900000 + 100000);
        }

        function updateQR() {
            const date = document.getElementById('qrDate').value;
            const team = document.getElementById('qrTeam').value;
            const token = generateToken();

            // 실제 직원 출퇴근 주소 형식 (/attendance 로 변경됨)
            const baseUrl = window.location.origin + "/attendance/";
            const fullUrl = `${baseUrl}?date=${date}&team=${encodeURIComponent(team)}&token=${token}`;
            
            const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(fullUrl)}`;
            document.getElementById('qrImage').src = qrApi;
            document.getElementById('qrInfo').innerText = `대상: ${team} | 날짜: ${date}`;
            
            timeLeft = 20;
        }

        function startQRStream() {
            const date = document.getElementById('qrDate').value;
            const team = document.getElementById('qrTeam').value;
            if (!date || !team) { alert('날짜와 팀을 모두 선택하세요.'); return; }

            document.getElementById('qrDisplay').style.display = 'block';
            
            if(qrInterval) clearInterval(qrInterval);
            if(timerInterval) clearInterval(timerInterval);

            updateQR();

            // 20초 주기 갱신
            qrInterval = setInterval(updateQR, 20000);
            
            // 1초 타이머 UI
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timerDisplay').innerText = `보안 갱신까지 남은 시간: ${timeLeft}초`;
                if(timeLeft <= 0) timeLeft = 20;
            }, 1000);
        }

        window.onload = loadTeams;
    </script>
</body>
</html>
