<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공용 출퇴근 QR 코드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background-color: #ecf0f1; margin: 0; font-family: 'Noto Sans KR', sans-serif;
        }
        .qr-container {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
        }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 28px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 30px; }
        #qrcode {
            display: flex; justify-content: center; margin: 20px 0;
            padding: 20px; border: 5px solid #3498db; border-radius: 10px;
        }
        .timer-text { font-size: 20px; font-weight: bold; color: #e74c3c; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="qr-container">
        <h1>출퇴근 인증 QR</h1>
        <p class="subtitle">스마트폰 카메라로 아래 QR 코드를 스캔하세요.</p>
        
        <div id="qrcode"></div>
        
        <div class="timer-text" id="timer">QR 갱신까지: 10초</div>
    </div>

    <script>
        let qrcode = new QRCode(document.getElementById("qrcode"), {
            width: 300,
            height: 300,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // 10초 주기 토큰 생성 로직 (팀 구분 없이 공통)
        function generateToken() {
            const now = new Date();
            const kstTime = new Date(now.getTime() + (9 * 60 * 60 * 1000)); // 한국 시간
            // 10000ms(10초) 주기로 timestamp 계산
            const timestamp = Math.floor(kstTime.getTime() / 10000); 
            return String((timestamp) % 900000 + 100000); // 6자리 랜덤 보안 토큰
        }

        // 출퇴근용 웹페이지 주소 생성 (kny-company.com 적용)
        function generateQRData() {
            const token = generateToken();
            const domain = window.location.origin; // 현재 도메인 (kny-company.com)
            // 출퇴근 등록 화면(employee/scan.html)으로 토큰만 넘김 (team 파라미터 삭제)
            return `${domain}/employee/scan.html?token=${token}`;
        }

        function updateQR() {
            const qrData = generateQRData();
            qrcode.clear();
            qrcode.makeCode(qrData);
        }

        // 1초마다 화면 타이머 업데이트 및 10초마다 QR 갱신
        setInterval(() => {
            const seconds = new Date().getSeconds();
            const remain = 10 - (seconds % 10); // 10초 단위 계산
            
            document.getElementById('timer').innerText = `QR 갱신까지: ${remain}초`;
            
            // 나머지가 10일 때 (즉 주기가 새로 시작될 때) QR코드 새로고침
            if (remain === 10) {
                updateQR();
            }
        }, 1000);

        // 페이지 최초 로드 시 1회 실행
        updateQR();
    </script>
</body>
</html>
