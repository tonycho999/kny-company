<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 관리 설정 - 출퇴근 관리</title>
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        /* 설정 페이지 추가 전용 스타일 */
        .form-group { display: flex; gap: 10px; margin-bottom: 30px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .form-group input { padding: 10px; border: 1px solid #ced4da; border-radius: 6px; flex: 1; font-size: 0.95rem; }
        .status-active { color: #2ecc71; font-weight: bold; }
        .status-retired { color: #e74c3c; font-weight: bold; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; border-radius: 4px; cursor: pointer; border: none; color: white; font-weight: bold; margin-right: 4px;}
        .btn-status-change { background-color: #f39c12; }
        .btn-delete { background-color: #e74c3c; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>직원 관리 설정</h1>
        
        <div class="nav-links">
            <a href="/admin/index.html">📅 출퇴근 기록 조회</a>
            <a href="/admin/settings.html" style="text-decoration: underline; color: #2c3e50;">⚙️ 직원 관리 설정</a>
        </div>

        <h3>👤 신규 직원 등록</h3>
        <form id="employee-form" class="form-group">
            <input type="text" id="empId" placeholder="사원번호 (예: 202601)" required autocomplete="off">
            <input type="text" id="empName" placeholder="이름" required autocomplete="off">
            <input type="text" id="empContact" placeholder="연락처 (예: 010-1234-5678)" required autocomplete="off">
            <button type="submit" class="btn-admin">직원 추가</button>
        </form>

        <h3>📋 직원 리스트</h3>
        <table>
            <thead>
                <tr>
                    <th>사원번호</th>
                    <th>이름</th>
                    <th>연락처</th>
                    <th>상태</th>
                    <th>관리 명령</th>
                </tr>
            </thead>
            <tbody id="employee-body">
                <tr>
                    <td colspan="5" style="text-align: center; color: #7f8c8d;">직원 목록을 불러오는 중입니다...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
