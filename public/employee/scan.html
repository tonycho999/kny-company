<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNY Company - 출퇴근 등록 시스템</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f6fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%; margin: 20px; }
        h1 { color: #2c3e50; margin-bottom: 25px; font-size: 24px; font-weight: bold; }
        .emp-name-tag { font-size: 22px; color: #2c3e50; font-weight: bold; margin-bottom: 20px; display: block; }
        input[type="text"] { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; text-align: center; }
        
        button { width: 100%; padding: 14px; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-blue { background-color: #3498db; }
        .btn-blue:hover { background-color: #2980b9; }
        
        .action-box { display: flex; gap: 15px; margin-top: 20px; }
        .btn-in { background-color: #2ecc71; font-size: 18px; padding: 20px 0; }
        .btn-in:hover { background-color: #27ae60; }
        .btn-out { background-color: #e67e22; font-size: 18px; padding: 20px 0; }
        .btn-out:hover { background-color: #d35400; }
        
        .message { margin-top: 15px; font-size: 18px; font-weight: bold; line-height: 1.6; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
        .info { color: #7f8c8d; }
        .warning { color: #f39c12; }
        .hidden { display: none; }
        .reset-link { margin-top: 30px; display: inline-block; color: #b2bec3; font-size: 13px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>출퇴근 등록</h1>
        
        <div id="auth-form" class="hidden">
            <p style="color: #7f8c8d; margin-bottom: 15px; font-size: 15px;">최초 1회 사원번호 등록이 필요합니다.</p>
            <input type="text" id="employeeId" placeholder="사원번호를 입력하세요">
            <button class="button btn-blue" onclick="handleManualSubmit()">사원번호 인증하기</button>
        </div>

        <div id="choice-form" class="hidden">
            <span class="emp-name-tag" id="target-emp-name">○○○ 님</span>
            <p id="action-guide" style="color: #7f8c8d; font-size: 16px;">오늘 근무를 시작하시겠습니까?</p>
            <div class="action-box">
                <button id="btn-clock-in" class="btn-in hidden" onclick="submitAttendance('in')">☀️ 출근하기</button>
                <button id="btn-clock-out" class="btn-out hidden" onclick="submitAttendance('out')">🌙 퇴근하기</button>
            </div>
        </div>

        <div id="status-area">
            <p class="message info" id="status-text">🔄 시스템에 안전하게 연결 중입니다...</p>
        </div>

        <span id="reset-btn" class="reset-link hidden" onclick="resetSavedId()">사원번호 재설정</span>
    </div>

    <script>
        // 💡 주소창 파라미터 읽어오기 및 은폐 로직
        const urlParams = new URLSearchParams(window.location.search);
        let rawToken = urlParams.get('token');
        
        if (rawToken) {
            sessionStorage.setItem('scan_token', rawToken); // 메모리에 임시 보관
            window.history.replaceState({}, document.title, window.location.pathname); // 주소창 지우기
        } else {
            rawToken = sessionStorage.getItem('scan_token'); // 새로고침 시 메모리에서 복구
        }

        const audioIn = new Audio('/sounds/clock_in.mp3');
        const audioOut = new Audio('/sounds/clock_out.mp3');
        
        let globalEmployeeId = ""; 
        let todayClockIn = false;
        let todayClockOut = false;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!rawToken) {
                showMsg('❌ 올바르지 않은 접근입니다. (QR 코드가 만료되었거나 없습니다.)', 'error');
                return;
            }

            // 난독화 복호화 및 시간 검증 로직
            const currentSlice = Math.floor(Date.now() / 10000);
            const tokenDiff = currentSlice - (parseInt(rawToken) - 83749); // 복호화(-83749) 후 비교
            
            if (tokenDiff < 0 || tokenDiff > 2) { 
                showMsg('❌ 만료된 QR코드입니다. 입구의 최신 화면을 다시 스캔해주세요.', 'error');
                return;
            }

            const savedId = localStorage.getItem('savedEmployeeId');
            if (savedId) {
                globalEmployeeId = savedId;
                document.getElementById('reset-btn').classList.remove('hidden');
                await openChoiceForm(savedId);
            } else {
                document.getElementById('status-area').classList.add('hidden');
                document.getElementById('auth-form').classList.remove('hidden');
            }
        });

        async function handleManualSubmit() {
            const employeeId = document.getElementById('employeeId').value.trim();
            if (!employeeId) return alert('사원번호를 입력해주세요.');

            if (confirm('입력하신 사원번호를 이 휴대폰에 저장하시겠습니까?\n저장하시면 다음 스캔부터는 사번 입력창이 생략됩니다.')) {
                localStorage.setItem('savedEmployeeId', employeeId);
            }
            
            globalEmployeeId = employeeId;
            document.getElementById('auth-form').classList.add('hidden');
            document.getElementById('reset-btn').classList.remove('hidden');
            await openChoiceForm(employeeId);
        }

        async function openChoiceForm(employeeId) {
            showMsg('🔄 직원 및 근태 기록을 조회 중입니다...', 'info');
            try {
                // 1. 사원 정보 확인
                const resEmp = await fetch('/api/employees');
                const employees = await resEmp.json();
                const currentEmp = employees.find(emp => emp.employee_id === employeeId);
                
                if (!currentEmp) {
                    showMsg('❌ 등록되지 않은 사원번호입니다. 사번을 재설정해 주세요.', 'error');
                    return;
                }

                // 2. 오늘 내 출퇴근 기록 확인 (백엔드 /api/attendance 활용)
                const today = new Date().toISOString().split('T')[0]; // 클라이언트 기준 오늘 날짜
                const resAtt = await fetch(`/api/attendance?date=${today}`);
                const attendances = await resAtt.json();
                
                const myTodayRecord = attendances.find(att => att.employee_id === employeeId);
                
                if (myTodayRecord) {
                    if (myTodayRecord.clock_in) todayClockIn = true;
                    if (myTodayRecord.clock_out) todayClockOut = true;
                }

                // UI 연동
                document.getElementById('target-emp-name').innerText = `✨ ${currentEmp.name} 님`;
                document.getElementById('status-area').classList.add('hidden');
                document.getElementById('choice-form').classList.remove('hidden');

                // 💡 [핵심] 출/퇴근 상태에 따른 버튼 조건부 노출
                if (!todayClockIn) {
                    // 출근 전
                    document.getElementById('action-guide').innerText = '☀️ 오늘 근무를 시작하시겠습니까?';
                    document.getElementById('btn-clock-in').classList.remove('hidden');
                } else if (todayClockIn && !todayClockOut) {
                    // 출근은 했으나 퇴근 전
                    document.getElementById('action-guide').innerText = '🌙 오늘 근무를 마치고 퇴근하시겠습니까?';
                    document.getElementById('btn-clock-out').classList.remove('hidden');
                } else if (todayClockIn && todayClockOut) {
                    // 출퇴근 모두 완료
                    document.getElementById('choice-form').classList.add('hidden');
                    showMsg('🎉 오늘 하루도 수고 많으셨습니다!\n(출퇴근 처리가 모두 완료된 상태입니다)', 'success');
                }

            } catch (e) {
                showMsg('❌ 서버 통신 중 오류가 발생했습니다.', 'error');
            }
        }

        async function submitAttendance(type) {
            document.getElementById('choice-form').classList.add('hidden');
            showMsg('⏳ 출퇴근 기록을 전송하는 중입니다...', 'info');

            try {
                // 이전 대화의 기존 백엔드 API 형식(getValidTokens 검증방식) 호환성을 위해 
                // 복호화하지 않은 오리지널 토큰 구조인 (시간값만 있는) 토큰 재생성해서 넘김
                const oldStyleToken = String(Math.floor(Date.now() / 10000) % 900000 + 100000); 

                const response = await fetch('/api/attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId: globalEmployeeId, type, token: oldStyleToken })
                });

                const result = await response.json();
                
                if (response.ok) {
                    const now = new Date();
                    const hours = String(now.getHours()).padStart(2, '0');
                    const minutes = String(now.getMinutes()).padStart(2, '0');
                    const typeText = type === 'in' ? '출근' : '퇴근';

                    if (type === 'in') audioIn.play().catch(e => console.log("재생 차단 방어"));
                    else audioOut.play().catch(e => console.log("재생 차단 방어"));

                    showMsg(`✅ ${result.name}님, ${hours}시 ${minutes}분에 ${typeText} 처리되었습니다.`, 'success');
                } else {
                    showMsg(`❌ 처리 실패: ${result.error}`, 'error');
                }
            } catch (error) {
                showMsg('❌ 서버 전송 오류가 발생했습니다.', 'error');
            }
        }

        function showMsg(text, className) {
            document.getElementById('status-area').classList.remove('hidden');
            const txtNode = document.getElementById('status-text');
            txtNode.innerText = text;
            txtNode.className = `message ${className}`;
        }

        function resetSavedId() {
            if (confirm('저장된 사원번호를 삭제하시겠습니까?')) {
                localStorage.removeItem('savedEmployeeId');
                sessionStorage.removeItem('scan_token');
                window.location.reload();
            }
        }
    </script>
</body>
</html>
