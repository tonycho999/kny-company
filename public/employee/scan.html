<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNY Company - 출퇴근 등록 시스템</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f5f6fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 100%; margin: 20px; }
        h1 { color: #2c3e50; margin-bottom: 25px; font-size: 24px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 14px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        .message { margin-top: 10px; font-size: 18px; font-weight: bold; line-height: 1.6; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
        .info { color: #7f8c8d; }
        .warning { color: #f39c12; }
        .hidden { display: none; }
        .reset-link { margin-top: 30px; display: inline-block; color: #b2bec3; font-size: 13px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>출퇴근 등록</h1>
        
        <div id="auth-form" class="hidden">
            <p style="color: #7f8c8d; margin-bottom: 15px; font-size: 15px;">최초 1회 사원번호 등록이 필요합니다.</p>
            <input type="text" id="employeeId" placeholder="사원번호를 입력하세요">
            <button onclick="handleManualSubmit()">출퇴근 인증하기</button>
        </div>

        <div id="status-area">
            <p class="message info" id="status-text">🔄 출퇴근 정보를 확인하고 있습니다...</p>
        </div>

        <span id="reset-btn" class="reset-link hidden" onclick="resetSavedId()">사원번호 재설정</span>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        // ✨ 미리 오디오 객체 선언 (100% 구동용)
        const audioIn = new Audio('/sounds/clock_in.mp3');
        const audioOut = new Audio('/sounds/clock_out.mp3');

        document.addEventListener('DOMContentLoaded', () => {
            if (!token) {
                showMsg('❌ 올바르지 않은 접근입니다.', 'error');
                return;
            }

            // 1분 쿨타임 검사
            const lastScanTime = localStorage.getItem('lastScanTime');
            const nowMs = Date.now();
            if (lastScanTime && (nowMs - parseInt(lastScanTime)) < 60000) {
                const remainSec = 60 - Math.floor((nowMs - parseInt(lastScanTime)) / 1000);
                showMsg(`⏳ 방금 처리가 완료되었습니다.\n실수 방지를 위해 ${remainSec}초 후에 다시 시도해주세요.`, 'warning');
                return;
            }

            const savedId = localStorage.getItem('savedEmployeeId');
            if (savedId) {
                document.getElementById('reset-btn').classList.remove('hidden');
                processAttendance(savedId);
            } else {
                document.getElementById('status-area').classList.add('hidden');
                document.getElementById('auth-form').classList.remove('hidden');
            }
        });

        async function handleManualSubmit() {
            const employeeId = document.getElementById('employeeId').value.trim();
            if (!employeeId) return alert('사원번호를 입력해주세요.');

            if (confirm('사원번호를 이 휴대폰에 저장하시겠습니까?')) {
                localStorage.setItem('savedEmployeeId', employeeId);
            }
            document.getElementById('auth-form').classList.add('hidden');
            document.getElementById('status-area').classList.remove('hidden');
            await processAttendance(employeeId);
        }

        async function processAttendance(employeeId) {
            try {
                const now = new Date();
                const kstTime = new Date(now.getTime() + (9 * 60 * 60 * 1000));
                const todayDate = kstTime.toISOString().split('T')[0];

                const resList = await fetch(`/api/attendance?date=${todayDate}`);
                const list = await resList.json();
                const myRecord = list.find(item => item.employeeId === employeeId);
                
                let type = 'in'; 
                if (myRecord) {
                    if (myRecord.clockIn && !myRecord.clockOut) type = 'out'; 
                    else if (myRecord.clockIn && myRecord.clockOut) {
                        showMsg('❌ 오늘 이미 출퇴근이 모두 완료되었습니다.', 'info');
                        return;
                    }
                }

                const response = await fetch('/api/attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId, type, token })
                });

                const result = await response.json();

                if (response.ok) {
                    const month = kstTime.getMonth() + 1;
                    const date = kstTime.getDate();
                    const hours = kstTime.getHours();
                    const minutes = String(kstTime.getMinutes()).padStart(2, '0');
                    const typeText = type === 'in' ? '출근' : '퇴근';

                    // ✨ 성공 시 해당 타입의 MP3 즉시 재생
                    if (type === 'in') {
                        audioIn.play().catch(e => console.log("오디오 재생 제한"));
                    } else {
                        audioOut.play().catch(e => console.log("오디오 재생 제한"));
                    }

                    showMsg(`✅ ${result.name}님, ${month}월 ${date}일 ${hours}시 ${minutes}분에 ${typeText}하였습니다.`, 'success');
                    localStorage.setItem('lastScanTime', Date.now());
                } else {
                    showMsg(`❌ 처리 실패: ${result.error}`, 'error');
                }
            } catch (error) {
                showMsg('❌ 서버 통신 오류가 발생했습니다.', 'error');
            }
        }

        function showMsg(text, className) {
            document.getElementById('status-area').classList.remove('hidden');
            const txtNode = document.getElementById('status-text');
            txtNode.innerText = text;
            txtNode.className = `message ${className}`;
        }

        function resetSavedId() {
            if (confirm('저장된 사원번호를 삭제하시겠습니까?')) {
                localStorage.removeItem('savedEmployeeId');
                localStorage.removeItem('lastScanTime');
                window.location.reload();
            }
        }
    </script>
</body>
</html>
