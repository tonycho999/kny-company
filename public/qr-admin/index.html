<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNY Company - 현장 출퇴근 관리</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .qr-wrapper { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); max-width: 450px; width: 100%; margin: 20px; color: #333; }
        h1 { color: #2c3e50; font-size: 28px; margin-bottom: 5px; font-weight: bold; }
        .sub-title { color: #7f8c8d; font-size: 16px; margin-bottom: 25px; font-weight: 500; }
        
        .img-container { min-height: 270px; display: flex; justify-content: center; align-items: center; }
        #qr-image { width: 250px; height: 250px; margin: 10px 0; border: 1px solid #eee; padding: 10px; border-radius: 12px; transition: opacity 0.2s; }
        
        .btn-generate { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; margin-bottom: 20px; }
        .btn-generate:hover { background: #2980b9; }

        .timer-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-top: 20px; }
        .timer-fill { height: 100%; width: 100%; background: #e74c3c; transform-origin: left; }
        
        .notice { color: #e74c3c; font-size: 14px; margin-top: 15px; font-weight: bold; }
        
        @keyframes countdown { from { transform: scaleX(1); } to { transform: scaleX(0); } }
    </style>
</head>
<body>

    <!-- 1. 처음 접속했을 때 보이는 버튼 화면 -->
    <div class="qr-wrapper" id="start-screen">
        <h1>직원 출퇴근 인증 데스크</h1>
        <div class="sub-title">현장 직원이 도착하면 아래 버튼을 눌러주세요</div>
        
        <!-- 💡 버튼 클릭 시 새 창을 띄웁니다 -->
        <button class="btn-generate" onclick="openSecureQRWindow()">QR 코드 새 창으로 열기</button>
    </div>

    <!-- 2. 새 창으로 떴을 때 보여지는 실제 QR 화면 (처음엔 숨김) -->
    <div class="qr-wrapper" id="qr-display-screen" style="display: none;">
        <h1>출퇴근 QR 스크린</h1>
        <div class="sub-title">스마트폰 기본 카메라로 스캔하세요</div>
        
        <p id="debug-url" style="font-size:10px; color:#bdc3c7; word-break: break-all; margin-bottom:5px; height: 30px;"></p>
        
        <div class="img-container">
            <img id="qr-image" src="" alt="출퇴근 보안 QR코드">
        </div>
        
        <div class="timer-bar">
            <div class="timer-fill" id="progress"></div>
        </div>
        <p class="notice">⚠️ 10초마다 코드가 자동 갱신됩니다.</p>
    </div>

    <script>
        // 💡 버튼을 눌렀을 때 복잡한 주소를 만들어 새 창(새 탭)을 띄우는 함수
        function openSecureQRWindow() {
            const nowKst = new Date(Date.now() + (9 * 60 * 60 * 1000));
            const token = Math.floor(nowKst.getTime() / 10000);
            const fakeSig = Math.random().toString(36).substring(2) + Math.random().toString(36).substring(2);
            
            // 현재 주소(admin-QR)에 매우 복잡한 파라미터를 붙여서 새 탭으로 엽니다.
            const newWindowUrl = `${window.location.origin}/admin-QR/?secure_session=${fakeSig}&time_token=${token}&display_mode=active`;
            
            window.open(newWindowUrl, '_blank');
        }

        // 💡 페이지가 로드될 때, 이 화면이 "첫 화면"인지 "새 창(QR화면)"인지 파악합니다.
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            // 주소창에 display_mode=active 라는 글자가 있다면, 이건 새 창으로 열린 QR 화면입니다.
            if (urlParams.get('display_mode') === 'active') {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('qr-display-screen').style.display = 'block';
                
                // QR 생성 및 10초 타이머 시작
                startQRSystem();
            }
        });

        // ----------------------------------------------------
        // 아래는 새 창에서 QR을 10초마다 갱신하는 로직입니다.
        // ----------------------------------------------------
        function startQRSystem() {
            generateAdminQR(); 
            setInterval(generateAdminQR, 10000); 

            const prog = document.getElementById('progress');
            prog.style.animation = 'countdown 10s linear infinite';
            
            setInterval(() => {
                prog.style.animation = 'none';
                prog.offsetHeight; 
                prog.style.animation = 'countdown 10s linear infinite';
            }, 10000);
        }

        function generateAdminQR() {
            const nowKst = new Date(Date.now() + (9 * 60 * 60 * 1000));
            const timeSlice = Math.floor(nowKst.getTime() / 10000); 
            const fakeSig = Math.random().toString(36).substring(2) + Math.random().toString(36).substring(2) + "KNYSECURE";
            
            // 직원이 스마트폰으로 스캔했을 때 넘어갈 주소
            const fullUrl = window.location.origin + "/attendance.html?auth_sig=" + fakeSig + "&token=" + timeSlice + "&mode=secure";
            document.getElementById('debug-url').innerText = "코드 번호: " + timeSlice; 
            
            const cacheBuster = new Date().getTime() + Math.random();
            const qrApiUrl = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&margin=10&data=" + encodeURIComponent(fullUrl) + "&cb=" + cacheBuster;

            const qrImg = document.getElementById('qr-image');
            qrImg.style.opacity = '0.3';
            qrImg.src = qrApiUrl;
            qrImg.onload = function() { qrImg.style.opacity = '1'; }
        }
    </script>
</body>
</html>
